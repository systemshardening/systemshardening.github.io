name: Build and deploy site

on:
  workflow_dispatch:
  repository_dispatch:
    types: [content-updated]
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout site repo
        uses: actions/checkout@v6

      - name: Check README for sensitive content
        run: |
          PATTERNS="systemshardening-roadmap-planning|CONTENT_REPO_READ_TOKEN|SITE_REPO_PUSH_TOKEN|SITE_REPO_DISPATCH_TOKEN"
          if find . -maxdepth 1 -name "*.md" | xargs grep -El "$PATTERNS" 2>/dev/null | grep .; then
            echo "ERROR: Sensitive content found in a markdown file. Aborting deployment."
            exit 1
          fi

      - name: Checkout content from private repo
        uses: actions/checkout@v6
        with:
          repository: systemshardening/systemshardening-roadmap-planning
          path: external-content
          token: ${{ secrets.CONTENT_REPO_READ_TOKEN }}
          sparse-checkout: |
            articles
          sparse-checkout-cone-mode: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          CONTENT_DIR: external-content/articles

      - name: Add .nojekyll
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
