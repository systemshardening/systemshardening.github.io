name: Build and deploy site

on:
  workflow_dispatch:
  repository_dispatch:
    types: [content-updated]
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4

      - name: Checkout content from private repo
        uses: actions/checkout@v4
        with:
          repository: systemshardening/systemshardening-roadmap-planning
          path: external-content
          token: ${{ secrets.CONTENT_REPO_READ_TOKEN }}
          sparse-checkout: |
            articles
          sparse-checkout-cone-mode: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          CONTENT_DIR: external-content/articles

      - name: Add .nojekyll
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
